<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit OS SDK — API Reference</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-w: 256px;
  --sidebar-bg: #111827;
  --accent: #3b82f6;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --code-bg: #f8fafc;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
body { font-family: var(--font); color: var(--text); display: flex; min-height: 100vh; background: #fff; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 10;
  padding-bottom: 40px;
  scrollbar-width: thin; scrollbar-color: #374151 transparent;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
.sidebar-logo { padding: 20px 20px 4px; display: flex; justify-content: center; }
.sidebar-logo img { height: 42px; width: auto; display: block; }
.sidebar-version { padding: 10px 20px 18px; color: #4b5563; font-size: 14px; text-align: center; }
.sidebar-section { padding: 16px 20px 4px 32px; font-size: 14px; font-weight: 600; }
#sidebar .sidebar-section a { color: #9ca3af; text-decoration: none; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 700; padding: 0; border: none; margin: 0; }
#sidebar .sidebar-section a:hover { color: #d1d5db; }
#sidebar .sidebar-section a .chevron { font-style: normal; font-size: 10px; transition: transform .2s; margin-right: 6px; }
#sidebar .sidebar-section.open a .chevron { transform: rotate(90deg); }
#sidebar nav a {
  display: block; padding: 4px 20px 4px 52px;
  color: #6b7280; text-decoration: none; font-size: 13px;
  border-left: 2px solid transparent; margin-left: -2px;
  transition: color .12s, border-color .12s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#sidebar nav a:hover { color: #d1d5db; }
#sidebar nav a.active { color: #fff; border-left-color: var(--accent); }

/* ── Main ── */
#main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; }

/* ── Under construction banner ── */
#under-construction {
  background: #1a1a1a;
  color: #ef4444;
  text-align: center;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

/* ── Lang bar ── */
#lang-bar {
  position: sticky; top: 0; z-index: 9;
  background: #fff; border-bottom: 1px solid var(--border);
  height: 48px; padding: 0 40px;
  display: flex; align-items: center; gap: 6px;
}
#lang-bar .label { font-size: 12px; color: var(--muted); font-weight: 500; margin-right: 6px; }
.lang-btn {
  padding: 4px 14px; border: 1px solid var(--border); background: #fff;
  border-radius: 6px; font-size: 13px; font-family: var(--font);
  cursor: pointer; color: var(--muted); transition: all .12s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sidebar-version-select { padding: 0 20px 18px; display: flex; justify-content: center; }
#version-select {
  padding: 4px 10px; border: 1px solid #374151; background: #1f2937;
  border-radius: 6px; font-size: 12px; font-family: var(--mono);
  color: #9ca3af; cursor: pointer; outline: none; transition: border-color .12s; width: 100%;
}
#version-select:hover, #version-select:focus { border-color: #6b7280; color: #d1d5db; }

/* ── Content ── */
#content { padding: 48px 48px 100px; max-width: 1200px; }

.service-block { margin-bottom: 60px; scroll-margin-top: 64px; }
.service-block h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.service-desc { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
.service-permission { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; font-size: 12px; color: #92400e; background: #fef3c7; border: 1px solid #fde68a; border-radius: 6px; padding: 4px 10px; font-family: var(--mono); }
.service-permission::before { content: '🔑'; font-size: 11px; }
.service-checked { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-left: 8px; vertical-align: middle; title: 'Reviewed'; }

.method-card {
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 16px; overflow: hidden; scroll-margin-top: 64px;
}
.method-header {
  padding: 12px 18px; background: #f9fafb;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
}
.method-name { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.method-desc { color: var(--muted); font-size: 13px; }
.method-body { padding: 16px 18px; }

.tbl-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; margin-bottom: 6px; margin-top: 14px; }
.tbl-label:first-child { margin-top: 0; }
table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 0 0 5px; border-bottom: 1px solid var(--border); }
td { padding: 7px 0; font-size: 13px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
td:first-child { font-family: var(--mono); font-size: 12px; width: 140px; padding-right: 12px; }
td:nth-child(2) { font-family: var(--mono); font-size: 12px; color: #7c3aed; width: 110px; padding-right: 12px; }
td:last-child { color: #374151; }

.code-block {
  display: none; margin-top: 14px;
  background: #0f172a; border-radius: 8px;
  padding: 16px 18px; overflow-x: auto;
  font-family: var(--mono); font-size: 13px; line-height: 1.65; color: #d4d4d4;
}
.code-block.visible { display: block; }
.kw { color: #569cd6; }
.tp { color: #4ec9b0; }
.fn { color: #dcdcaa; }
.st { color: #ce9178; }
.cm { color: #6a9955; font-style: italic; }
.vr { color: #9cdcfe; }

.sig-block {
  display: none; margin-top: 14px;
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 12px 18px; overflow-x: auto;
  font-family: var(--mono); font-size: 13px; line-height: 1.65; color: #1e293b;
}
.sig-block.visible { display: block; }
.sig-block .kw { color: #1d4ed8; }
.sig-block .tp { color: #059669; }
.sig-block .fn { color: #b45309; }
.sig-block .st { color: #dc2626; }
.sig-block .vr { color: #1e293b; }
.type-link { color: #7c3aed; text-decoration: none; font-family: var(--mono); font-size: 12px; }
.type-link:hover { text-decoration: underline; }
.sidebar-types-hdr { padding: 20px 20px 4px 32px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #4b5563; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Orbit OS"></div>
  <div class="sidebar-version">SDK API 26 Reference</div>
  <div class="sidebar-version-select"><select id="version-select"></select></div>
  <nav id="sidebar-nav"></nav>
</div>

<div id="main">
  <div id="under-construction">⚠ Under Construction — documentation is incomplete and subject to change</div>
  <div id="lang-bar">
    <span class="label">Language</span>
    <button class="lang-btn active" data-lang="go">Go</button>
  </div>
  <div id="content"></div>
</div>

<script>
// helper — returns { sig, example } for two-part rendering
function sig(signature, example) {
  return { sig: signature, example };
}

// helper — "AuthManager" → "Auth Manager"
function spacedName(name) {
  return name
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace('Wi Fi', 'WiFi')
    .replace('Gpio', 'GPIO')
    .replace('Pwm', 'PWM')
    .replace('Uart', 'UART')
    .replace('Spi', 'SPI')
    .replace('I2C', 'I2C');
}

      { name: 'MemoryUsage',          type: 'float64',                        desc: 'Memory usage percentage' },
      { name: 'SocThermal',           type: 'float64',                        desc: 'SoC temperature (°C)' },
      { name: 'CpuStats',             type: '*MetricsInfo_CpuStats',          desc: 'CPU context-switch and interrupt counters' },
      { name: 'CpuFreq',              type: '*MetricsInfo_CpuFreq',           desc: 'CPU frequency info (MHz)' },
      { name: 'VirtualMemory',        type: '*MetricsInfo_VirtualMemory',     desc: 'Detailed memory breakdown' },
      { name: 'DiskUsage',            type: 'map[string]*MetricsInfo_DiskUsage', desc: 'Disk usage per mount point' },
      { name: 'DiskIoCounters',       type: '*MetricsInfo_DiskIoCounters',    desc: 'Disk I/O counters' },
      { name: 'Network',              type: '*MetricsInfo_Network',           desc: 'Network I/O counters' },
      { name: 'SensorsTemperatures',  type: 'int32',                          desc: 'Sensor temperature reading' },
    ],
  },
  {
    id: 'type-metricsinfo-sysuptime', name: 'MetricsInfo_SysUptime',
    desc: 'System uptime and load average.',
    fields: [
      { name: 'Time',        type: 'string',    desc: 'Current system time string' },
      { name: 'Uptime',      type: 'int64',     desc: 'Uptime in seconds' },
      { name: 'Users',       type: 'int32',     desc: 'Number of logged-in users' },
      { name: 'LoadAverage', type: '[]float64', desc: '1-min, 5-min, 15-min load averages' },
    ],
  },
  {
    id: 'type-metricsinfo-cpustats', name: 'MetricsInfo_CpuStats',
    desc: 'CPU context-switch and interrupt counters since boot.',
    fields: [
      { name: 'CtxSwitches',    type: 'int64', desc: 'Total context switches' },
      { name: 'Interrupts',     type: 'int64', desc: 'Total hardware interrupts' },
      { name: 'SoftInterrupts', type: 'int64', desc: 'Total software interrupts' },
      { name: 'Syscalls',       type: 'int64', desc: 'Total system calls' },
    ],
  },
  {
    id: 'type-metricsinfo-cpufreq', name: 'MetricsInfo_CpuFreq',
    desc: 'CPU frequency information in MHz.',
    fields: [
      { name: 'Current', type: 'float64', desc: 'Current CPU frequency (MHz)' },
      { name: 'Min',     type: 'float64', desc: 'Minimum CPU frequency (MHz)' },
      { name: 'Max',     type: 'float64', desc: 'Maximum CPU frequency (MHz)' },
    ],
  },
  {
    id: 'type-metricsinfo-virtualmemory', name: 'MetricsInfo_VirtualMemory',
    desc: 'Detailed virtual memory breakdown (all sizes in bytes).',
    fields: [
      { name: 'Total',     type: 'int64',   desc: 'Total installed RAM (bytes)' },
      { name: 'Available', type: 'int64',   desc: 'Available memory (bytes)' },
      { name: 'Percent',   type: 'float64', desc: 'Usage percentage' },
      { name: 'Used',      type: 'int64',   desc: 'Used memory (bytes)' },
      { name: 'Free',      type: 'int64',   desc: 'Free memory (bytes)' },
      { name: 'Active',    type: 'int64',   desc: 'Active memory (bytes)' },
      { name: 'Inactive',  type: 'int64',   desc: 'Inactive memory (bytes)' },
      { name: 'Buffers',   type: 'int64',   desc: 'Buffer cache (bytes)' },
      { name: 'Cached',    type: 'int64',   desc: 'Page cache (bytes)' },
      { name: 'Shared',    type: 'int64',   desc: 'Shared memory (bytes)' },
      { name: 'Slab',      type: 'int64',   desc: 'Kernel slab cache (bytes)' },
    ],
  },
  {
    id: 'type-metricsinfo-diskusage', name: 'MetricsInfo_DiskUsage',
    desc: 'Disk usage for a single mount point (all sizes in bytes).',
    fields: [
      { name: 'Total',   type: 'int64',   desc: 'Total disk size (bytes)' },
      { name: 'Used',    type: 'int64',   desc: 'Used space (bytes)' },
      { name: 'Free',    type: 'int64',   desc: 'Free space (bytes)' },
      { name: 'Percent', type: 'float64', desc: 'Usage percentage' },
    ],
  },
  {
    id: 'type-metricsinfo-diskiocounters', name: 'MetricsInfo_DiskIoCounters',
    desc: 'Disk I/O counters since boot.',
    fields: [
      { name: 'ReadCount',        type: 'int64', desc: 'Number of reads' },
      { name: 'WriteCount',       type: 'int64', desc: 'Number of writes' },
      { name: 'ReadBytes',        type: 'int64', desc: 'Bytes read' },
      { name: 'WriteBytes',       type: 'int64', desc: 'Bytes written' },
      { name: 'ReadTime',         type: 'int64', desc: 'Time spent reading (ms)' },
      { name: 'WriteTime',        type: 'int64', desc: 'Time spent writing (ms)' },
      { name: 'ReadMergedCount',  type: 'int64', desc: 'Merged read operations' },
      { name: 'WriteMergedCount', type: 'int64', desc: 'Merged write operations' },
      { name: 'BusyTime',         type: 'int64', desc: 'Time disk was busy (ms)' },
    ],
  },
  {
    id: 'type-metricsinfo-network', name: 'MetricsInfo_Network',
    desc: 'Aggregated network I/O counters across all interfaces.',
    fields: [
      { name: 'BytesSent',   type: 'int64', desc: 'Total bytes sent' },
      { name: 'BytesRecv',   type: 'int64', desc: 'Total bytes received' },
      { name: 'PacketsSent', type: 'int64', desc: 'Total packets sent' },
      { name: 'PacketsRecv', type: 'int64', desc: 'Total packets received' },
      { name: 'Errin',       type: 'int64', desc: 'Total input errors' },
      { name: 'Errout',      type: 'int64', desc: 'Total output errors' },
      { name: 'Dropin',      type: 'int64', desc: 'Total inbound packets dropped' },
      { name: 'Dropout',     type: 'int64', desc: 'Total outbound packets dropped' },
    ],
  },
  {
    id: 'type-ethernetlinkproperties', name: 'EthernetLinkProperties',
    desc: 'Link-layer and IP properties of an Ethernet interface.',
    fields: [
      { name: 'InterfaceName', type: 'string',        desc: 'Interface name (e.g. "eth0")' },
      { name: 'MacAddress',    type: 'string',        desc: 'MAC address' },
      { name: 'State',         type: 'EthernetState', desc: 'Current link state' },
      { name: 'Mtu',           type: 'int32',         desc: 'Maximum transmission unit' },
      { name: 'DhcpEnable',    type: 'bool',          desc: 'True when DHCP is active' },
    ],
  },
  {
    id: 'type-zonerequest', name: 'ZoneRequest',
    desc: 'Firewall zone definition (as returned by ListZones).',
    fields: [
      { name: 'Name',         type: 'string',          desc: 'Zone name (e.g. "lan", "wan")' },
      { name: 'Interfaces',   type: '[]string',         desc: 'Network interfaces assigned to this zone' },
      { name: 'InputPolicy',  type: 'ZonePolicy',       desc: 'POLICY_ACCEPT | POLICY_DROP | POLICY_REJECT' },
      { name: 'OutputPolicy', type: 'ZonePolicy',       desc: 'POLICY_ACCEPT | POLICY_DROP | POLICY_REJECT' },
      { name: 'Masquerade',   type: 'bool',             desc: 'Enable NAT masquerade (typically wan only)' },
    ],
  },
  {
    id: 'type-firewallrule', name: 'FirewallRule',
    desc: 'A firewall traffic rule as returned by ListRules.',
    fields: [
      { name: 'Id',       type: 'string',          desc: 'Server-generated rule ID' },
      { name: 'SrcZone',  type: 'string',          desc: 'Source zone (empty = any)' },
      { name: 'DstZone',  type: 'string',          desc: 'Destination zone (empty = any)' },
      { name: 'Protocol', type: 'FirewallProtocol', desc: 'PROTO_ANY | PROTO_TCP | PROTO_UDP | PROTO_ICMP' },
      { name: 'SrcIp',    type: 'string',          desc: 'Source IP/CIDR (empty = any)' },
      { name: 'DestPort', type: 'int32',           desc: 'Destination port (0 = any)' },
      { name: 'Action',   type: 'ZonePolicy',      desc: 'POLICY_ACCEPT | POLICY_DROP | POLICY_REJECT' },
      { name: 'Comment',  type: 'string',          desc: 'Optional description' },
    ],
  },
];

const typeMap = {};
types.forEach(t => { typeMap[t.name] = t.id; });

function linkType(text) {
  if (!text) return text;
  return text.replace(/[A-Z][a-zA-Z0-9_]*/g, m => typeMap[m] ? `<a href="#${typeMap[m]}" class="type-link">${m}</a>` : m);
}

// ── Versions ──────────────────────────────────────────────────────────────────
// major = API proto version (26), middle = proto additions, patch = SDK-only changes

const versions = [
  { value: '26.0.0', label: '26.0.0', latest: true },
];

function buildVersionSelect() {
  const sel = document.getElementById('version-select');
  versions.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.value;
    opt.textContent = v.latest ? `${v.label} (latest)` : v.label;
    sel.appendChild(opt);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

let lang = 'go';

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.querySelectorAll('.code-block, .sig-block').forEach(b => b.classList.toggle('visible', b.dataset.lang === l));
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  services.forEach(svc => {
    const hdr = document.createElement('div');
    hdr.className = 'sidebar-section';
    hdr.innerHTML = `<a href="#${svc.id}"><span>${spacedName(svc.name)}</span><span class="chevron">&#9654;</span></a>`;

    const methods = document.createElement('div');
    methods.className = 'sidebar-methods';
    methods.style.display = 'none';
    svc.methods.forEach(m => {
      const a = document.createElement('a');
      a.href = '#' + m.id;
      a.textContent = m.name;
      a.dataset.id = m.id;
      methods.appendChild(a);
    });

    hdr.querySelector('a').addEventListener('click', e => {
      e.preventDefault();
      const isOpen = methods.style.display !== 'none';
      methods.style.display = isOpen ? 'none' : 'block';
      hdr.classList.toggle('open', !isOpen);
      if (!isOpen) document.getElementById(svc.id)?.scrollIntoView({ behavior: 'instant', block: 'start' });
    });

    nav.appendChild(hdr);
    nav.appendChild(methods);
  });

  const typesSec = document.createElement('div');
  typesSec.innerHTML = `<div class="sidebar-types-hdr">Types</div>`;
  types.forEach(t => {
    const a = document.createElement('a');
    a.href = '#' + t.id;
    a.textContent = t.name;
    a.dataset.id = t.id;
    typesSec.appendChild(a);
  });
  nav.appendChild(typesSec);
}

function buildContent() {
  const root = document.getElementById('content');
  services.forEach(svc => {
    const block = document.createElement('div');
    block.className = 'service-block';
    block.id = svc.id;
    const permHtml = svc.permission ? `<div class="service-permission"><span style="font-family:var(--font);font-weight:600;color:#78350f">Permission</span>${svc.permission}</div>` : '';
    const checkedDot = svc.checked ? `<span class="service-checked" title="Reviewed"></span>` : '';
    block.innerHTML = `<h2>${spacedName(svc.name)}${checkedDot}</h2><p class="service-desc">${svc.desc}</p>${permHtml}`;

    svc.methods.forEach(m => {
      const card = document.createElement('div');
      card.className = 'method-card';
      card.id = m.id;

      const pRows = m.params.map(p =>
        `<tr><td>${p.name}</td><td>${linkType(p.type)||''}</td><td>${p.desc||''}</td></tr>`
      ).join('');
      const rRows = m.returns.map(r =>
        `<tr><td>${linkType(r.name)}</td><td>${linkType(r.type)||''}</td><td>${r.desc||''}</td></tr>`
      ).join('');

      const hasSig = Object.values(m.code).some(c => c && typeof c === 'object');
      const sigBlocks = hasSig ? Object.entries(m.code).map(([l, c]) => {
        const s = (c && typeof c === 'object') ? c.sig : '';
        return `<pre class="sig-block${l===lang?' visible':''}" data-lang="${l}"><code>${s}</code></pre>`;
      }).join('') : '';
      const codeBlocks = Object.entries(m.code).map(([l, c]) => {
        const body = (c && typeof c === 'object') ? c.example : c;
        return `<pre class="code-block${l===lang?' visible':''}" data-lang="${l}"><code>${body}</code></pre>`;
      }).join('');

      card.innerHTML = `
        <div class="method-header">
          <span class="method-name">${m.name}</span>
          <span class="method-desc">${m.desc}</span>
        </div>
        <div class="method-body">
          ${hasSig ? `<div class="tbl-label">Signature</div>${sigBlocks}` : ''}
          ${m.params.length ? `<div class="tbl-label" style="${hasSig?'margin-top:18px':''}">Parameters</div>
          <table><thead><tr><th>Name</th><th>Type</th><th>Notes</th></tr></thead>
          <tbody>${pRows}</tbody></table>` : ''}
          <div class="tbl-label">Returns</div>
          <table><thead><tr><th>Name</th><th>Type</th><th>Notes</th></tr></thead>
          <tbody>${rRows}</tbody></table>
          <div class="tbl-label" style="margin-top:14px">Example</div>
          ${codeBlocks}
        </div>`;

      block.appendChild(card);
    });
    root.appendChild(block);
  });

  const typesBlock = document.createElement('div');
  typesBlock.className = 'service-block';
  typesBlock.id = 'types-section';
  typesBlock.innerHTML = `<h2>Types</h2><p class="service-desc">Complex objects returned or accepted by the SDK methods.</p>`;

  types.forEach(t => {
    const card = document.createElement('div');
    card.className = 'method-card';
    card.id = t.id;

    const fRows = t.fields.map(f =>
      `<tr><td>${f.name}</td><td style="font-family:var(--mono);font-size:12px;color:#7c3aed">${linkType(f.type)}</td><td>${f.desc}</td></tr>`
    ).join('');

    card.innerHTML = `
      <div class="method-header">
        <span class="method-name">${t.name}</span>
        <span class="method-desc">${t.desc}</span>
      </div>
      <div class="method-body">
        <div class="tbl-label">Fields</div>
        <table><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead>
        <tbody>${fRows}</tbody></table>
      </div>`;

    typesBlock.appendChild(card);
  });
  root.appendChild(typesBlock);
}


function syncSidebar() {
  const links = [...document.querySelectorAll('#sidebar-nav a[data-id]')];
  let active = null;
  links.forEach(a => {
    if (!a.offsetParent) return; // skip hidden elements (collapsed managers)
    const el = document.getElementById(a.dataset.id);
    if (el && el.getBoundingClientRect().top <= 72) active = a;
  });
  links.forEach(a => a.classList.remove('active'));
  if (active) active.classList.add('active');
}

buildVersionSelect();
buildSidebar();
buildContent();

document.querySelectorAll('.lang-btn').forEach(b =>
  b.addEventListener('click', () => setLang(b.dataset.lang))
);
document.getElementById('main').addEventListener('scroll', syncSidebar, { passive: true });
window.addEventListener('scroll', syncSidebar, { passive: true });
</script>
</body>
</html>
